version: 2
updates:
  # Main repo packages
  - package-ecosystem: bun
    directory: '/'
    schedule:
      interval: daily
    open-pull-requests-limit: 10

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'

  - package-ecosystem: bun
    directory: '/packages'
    schedule:
      interval: daily
    groups:
      monorepo-dependencies:
        group-by: dependency-name
